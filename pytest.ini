[pytest]
asyncio_mode = auto
testpaths = tests
log_cli = true
log_cli_level = INFO
log_cli_format = %(asctime)s [%(levelname)8s] %(name)s: %(message)s
addopts = -ra -q --strict-markers --tb=short
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
markers =
    integration: end-to-end pipeline tests
    asyncio: async tests
